<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>วิทยาศาสตร์ พิชิตสอบเข้า ม.1 — ชุดที่ 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
*{box-sizing:border-box}
body{
  margin:0; font-family:'Sarabun',sans-serif; color:#f8fbff;
  min-height:100vh; overflow-x:hidden;
  background: radial-gradient(circle at 20% 10%, #1dd3ff44, transparent 28%),
              radial-gradient(circle at 80% 20%, #a855f744, transparent 30%),
              linear-gradient(135deg,#07111f,#111827 48%,#020617);
}
body:before{
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.35;
  background-image: radial-gradient(#fff 1px, transparent 1px);
  background-size: 34px 34px;
  animation: star 18s linear infinite;
}
@keyframes star{from{transform:translateY(0)}to{transform:translateY(34px)}}
.wrap{width:min(980px,94vw); margin:auto; padding:24px 0 40px; position:relative; z-index:1}
.card{
  background:linear-gradient(180deg,#ffffff18,#ffffff0b);
  border:1px solid #ffffff2d; border-radius:28px; padding:28px;
  box-shadow:0 24px 70px #0008, inset 0 1px 0 #fff2;
  backdrop-filter: blur(10px);
}
.logo{display:inline-flex; gap:10px; align-items:center; padding:8px 16px; border-radius:999px;
  background:#38bdf833; border:1px solid #7dd3fc66; font-weight:800; color:#dff8ff}
h1{font-size:clamp(32px,5vw,58px); margin:20px 0 10px; line-height:1.1;
  text-shadow:0 0 26px #38bdf8aa}
.subtitle{font-size:clamp(18px,2.2vw,24px); color:#dbeafe; line-height:1.55}
input{
  width:100%; padding:18px 20px; border-radius:18px; border:2px solid #67e8f9;
  background:#020617cc; color:#fff; font-size:22px; outline:none; margin:18px 0 10px;
}
button{
  border:0; border-radius:18px; padding:15px 22px; font-family:inherit; font-size:19px; font-weight:800;
  cursor:pointer; color:#06121f; background:linear-gradient(135deg,#fde047,#38bdf8);
  box-shadow:0 10px 0 #075985, 0 18px 34px #0007; transition:.12s transform,.12s box-shadow;
}
button:hover{transform:translateY(-2px)}
button:active{transform:translateY(6px); box-shadow:0 4px 0 #075985, 0 8px 16px #0006}
.secondary{background:linear-gradient(135deg,#e0e7ff,#c084fc); box-shadow:0 10px 0 #6d28d9, 0 18px 34px #0007}
.danger{background:linear-gradient(135deg,#fecaca,#fb7185); box-shadow:0 10px 0 #be123c, 0 18px 34px #0007}
.hidden{display:none!important}
.topbar{display:flex; justify-content:space-between; gap:14px; align-items:center; margin-bottom:18px; flex-wrap:wrap}
.pill{padding:10px 16px; border-radius:999px; background:#020617bb; border:1px solid #60a5fa66; font-weight:800}
.progress{height:14px; background:#020617; border-radius:99px; overflow:hidden; border:1px solid #38bdf855; margin:16px 0}
.bar{height:100%; width:0%; background:linear-gradient(90deg,#22c55e,#fde047,#38bdf8); transition:.25s}
.qbox{font-size:clamp(22px,3vw,32px); font-weight:800; line-height:1.45; margin:16px 0 18px}
.options{display:grid; gap:14px}
.opt{
  width:100%; text-align:left; color:#f8fbff; background:linear-gradient(90deg,#0f172acc,#1e293bcc);
  border:2px solid #60a5fa55; box-shadow:none; border-radius:20px; padding:17px 18px;
  font-size:clamp(18px,2.2vw,23px); font-weight:700;
}
.opt:hover{border-color:#fde047; background:#172554}
.opt.selected{background:linear-gradient(90deg,#facc15,#38bdf8); color:#06121f; border-color:#fff}
.nav{display:flex; justify-content:space-between; gap:12px; margin-top:22px; flex-wrap:wrap}
.resultScore{font-size:clamp(42px,8vw,86px); font-weight:900; color:#fde047; text-shadow:0 0 30px #facc15aa; text-align:center}
.pass{text-align:center; font-size:clamp(24px,4vw,42px); font-weight:900; margin:8px 0 20px}
.review{display:grid; gap:14px; margin-top:20px}
.reviewItem{background:#020617aa; border:1px solid #ffffff22; border-radius:18px; padding:16px; line-height:1.55}
.correct{color:#86efac; font-weight:900}
.wrong{color:#fca5a5; font-weight:900}
.exp{color:#bfdbfe; margin-top:8px}
.footerBtns{display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:22px}
@media print{
  body{background:#fff;color:#000}
  body:before,.noPrint{display:none!important}
  .wrap{width:100%; padding:0}
  .card,.reviewItem{box-shadow:none; border:1px solid #999; background:#fff; color:#000}
  .exp{color:#000}
}
</style>
</head>
<body>
<div class="wrap">
  <section id="start" class="card">
    <div class="logo">⚡ Kru Pai Classroom • Science Entrance</div>
    <h1>วิทยาศาสตร์ พิชิตสอบเข้า ม.1 — ชุดที่ 2</h1>
    <p class="subtitle">ข้อสอบวิทยาศาสตร์ระดับปานกลาง–ยาก จำนวน 30 ข้อ สำหรับเตรียมสอบเข้า ม.1<br>มีระบบลงชื่อ คะแนน เฉลย และเสียงกดเพิ่มความเร้าใจ 🚀</p>
    <input id="studentName" placeholder="พิมพ์ชื่อนักเรียน..." />
    <button onclick="startGame()">เริ่มทำข้อสอบ</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="topbar">
      <div class="pill" id="nameShow">ผู้เล่น: -</div>
      <div class="pill" id="countShow">ข้อ 1/30</div>
      <div class="pill" id="scoreShow">คะแนน: 0</div>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="qbox" id="question"></div>
    <div class="options" id="options"></div>
    <div class="nav noPrint">
      <button class="secondary" onclick="prevQ()">ย้อนกลับ</button>
      <button onclick="nextQ()">ข้อถัดไป</button>
    </div>
  </section>

  <section id="result" class="card hidden">
    <div class="logo">📘 Kru Pai Classroom • Result Report</div>
    <h1>สรุปผลสอบ ชุดที่ 2</h1>
    <div class="subtitle" id="resultName"></div>
    <div class="resultScore" id="finalScore"></div>
    <div class="pass" id="passText"></div>
    <div class="footerBtns noPrint">
      <button onclick="window.print()">พิมพ์ / บันทึกเป็น PDF หรือ Word</button>
      <button class="secondary" onclick="restart()">กลับหน้าแรก</button>
    </div>
    <div class="review" id="review"></div>
  </section>
</div>

<script>

let current = 0;
let answers = Array(questions.length).fill(null);
let student = "";

let audioCtx;
function beep(type='click'){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    let freq = 440, dur = 0.08;
    if(type==='click'){freq=520; dur=.055;}
    if(type==='next'){freq=700; dur=.075;}
    if(type==='correct'){freq=880; dur=.10;}
    if(type==='finish'){freq=660; dur=.12;}
    o.frequency.setValueAtTime(freq, now);
    o.frequency.exponentialRampToValueAtTime(freq*1.7, now+dur);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.20, now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.start(now); o.stop(now+dur+0.02);
    if(type==='finish'){
      setTimeout(()=>beep('correct'),120);
      setTimeout(()=>beep('next'),240);
    }
  }catch(e){}
}

function startGame(){
  student = document.getElementById('studentName').value.trim() || 'นักเรียน';
  document.getElementById('start').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('nameShow').textContent = 'ผู้เล่น: ' + student;
  beep('finish');
  render();
}
function render(){
  const q = questions[current];
  document.getElementById('countShow').textContent = `ข้อ ${current+1}/${questions.length}`;
  document.getElementById('question').textContent = (current+1)+'. '+q.q;
  document.getElementById('bar').style.width = ((current)/questions.length*100)+'%';
  document.getElementById('scoreShow').textContent = 'คะแนน: ' + calcScore();
  const box = document.getElementById('options');
  box.innerHTML = '';
  q.opts.forEach((op,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current]===i ? ' selected':'');
    btn.textContent = (i+1)+') '+op;
    btn.onclick = ()=>{answers[current]=i; beep(i===q.ans?'correct':'click'); render();};
    box.appendChild(btn);
  });
}
function calcScore(){return answers.reduce((s,a,i)=>s+(a===questions[i].ans?1:0),0)}
function nextQ(){
  beep('next');
  if(current < questions.length-1){current++; render();}
  else{showResult();}
}
function prevQ(){
  beep('click');
  if(current>0){current--; render();}
}
function showResult(){
  beep('finish');
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  const score = calcScore();
  document.getElementById('resultName').textContent = 'ชื่อนักเรียน: ' + student;
  document.getElementById('finalScore').textContent = score + ' / ' + questions.length;
  const percent = Math.round(score/questions.length*100);
  document.getElementById('passText').innerHTML = percent >= 80 ? '🏆 ผ่านเกณฑ์ 80% — เยี่ยมมาก!' : '🔥 ยังไม่ผ่าน 80% — ทบทวนแล้วลองใหม่ได้!';
  const review = document.getElementById('review');
  review.innerHTML = '';
  questions.forEach((q,i)=>{
    const user = answers[i];
    const div = document.createElement('div');
    div.className = 'reviewItem';
    const ok = user === q.ans;
    div.innerHTML = `
      <div><b>ข้อ ${i+1}.</b> ${q.q}</div>
      <div class="${ok?'correct':'wrong'}">${ok?'✔ ตอบถูก':'✘ ตอบผิด/ยังไม่ได้ตอบ'}</div>
      <div>คำตอบของนักเรียน: ${user===null?'-':(user+1)+') '+q.opts[user]}</div>
      <div class="correct">เฉลย: ${q.ans+1}) ${q.opts[q.ans]}</div>
      <div class="exp">อธิบาย: ${q.exp}</div>
    `;
    review.appendChild(div);
  });
}
function restart(){
  beep('click'); current=0; answers=Array(questions.length).fill(null);
  document.getElementById('result').classList.add('hidden');
  document.getElementById('start').classList.remove('hidden');
}
</script>
